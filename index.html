<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RO-BOX: 3D Platform & Studio</title>
    <style>
        /* SMART GESTURE LOCKS */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #0b0e14; font-family: 'Segoe UI', Arial, sans-serif; color: #fff;
            -webkit-user-select: none; user-select: none;
        }
        input, textarea { -webkit-user-select: text; user-select: text; }

        /* Lock gestures ONLY on active game/studio screens, leaving menus scrollable */
        #game-container, #studio-workspace-view, #mobile-ui, .virtual-joystick-area {
            touch-action: none;
        }

        /* PLATFORM DASHBOARD STRUCTURE */
        #homepage-launcher {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at top, #1a2233 0%, #0d111a 100%);
            display: flex; z-index: 500; transition: opacity 0.3s ease;
        }
        #sidebar {
            width: 240px; background: rgba(18, 24, 38, 0.95);
            border-right: 1px solid rgba(255,255,255,0.05);
            display: flex; flex-direction: column; padding: 20px; box-sizing: border-box;
        }
        .logo-area { font-size: 22px; font-weight: 900; letter-spacing: 2px; color: #00e5ff; margin-bottom: 30px; }
        .nav-btn {
            background: transparent; border: none; color: #8fa0c2; padding: 12px 16px;
            text-align: left; font-size: 15px; font-weight: 600; cursor: pointer;
            border-radius: 8px; margin-bottom: 6px; transition: all 0.2s;
        }
        .nav-btn:hover, .nav-btn.active { background: rgba(0, 229, 255, 0.1); color: #00e5ff; }
        
        #main-content { flex: 1; padding: 20px; box-sizing: border-box; overflow-y: auto; display: flex; flex-direction: column; }
        .view-panel { display: none; flex-direction: column; height: 100%; }
        .view-panel.active { display: flex; }

        /* MOBILE RESPONSIVE LAYOUT */
        @media (max-width: 768px) {
            #homepage-launcher { flex-direction: column; }
            #sidebar { width: 100%; height: auto; flex-direction: row; padding: 10px; overflow-x: auto; border-right: none; border-bottom: 1px solid rgba(255,255,255,0.1); }
            .logo-area { display: none; }
            .nav-btn { margin-bottom: 0; margin-right: 8px; white-space: nowrap; font-size: 13px; padding: 10px; }
        }

        /* DYNAMIC GAME HUBS LISTING */
        .games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; margin-top: 15px; }
        .game-card {
            background: #161f30; border-radius: 12px; padding: 15px; cursor: pointer;
            border: 2px solid transparent; transition: transform 0.2s, background 0.2s; text-align: center;
        }
        .game-card:hover { transform: translateY(-3px); background: #1e2b42; }
        .game-thumb { width: 100%; height: 90px; border-radius: 8px; background: #22314a; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; font-size: 32px; }
        .game-title { font-weight: bold; font-size: 14px; color: #fff; }
        .game-creator { font-size: 11px; color: #6c7e9c; margin-top: 4px; }

        /* GAME PROFILE OVERLAY MODAL */
        #game-info-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 14, 20, 0.95); z-index: 600; display: none;
            align-items: center; justify-content: center; overflow-y: auto; padding: 20px; box-sizing: border-box;
        }
        .info-page-box {
            background: #161f30; border-radius: 16px; width: 100%; max-width: 500px;
            padding: 25px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .info-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
        .info-title { font-size: 24px; font-weight: 800; color: #00e5ff; }
        .info-meta { font-size: 13px; color: #a2b4d6; margin-top: 5px; }
        .info-body { font-size: 14px; color: #d1dcff; line-height: 1.6; margin-bottom: 20px; background: #0b0e14; padding: 15px; border-radius: 8px; min-height: 60px; }
        .info-footer-actions { display: flex; flex-direction: column; gap: 10px; }

        /* FORM UI MODULES */
        .form-box { background: #161f30; padding: 20px; border-radius: 12px; max-width: 500px; margin-bottom: 20px; }
        .input-row { display: flex; gap: 10px; margin-top: 10px; }
        input[type="text"], textarea {
            flex: 1; background: #0b0e14; border: 1px solid #2d3b54; padding: 12px;
            border-radius: 8px; color: white; font-size: 14px; outline: none;
        }
        .action-btn {
            background: #007bff; border: none; color: white; padding: 12px 20px;
            font-weight: bold; border-radius: 8px; cursor: pointer; transition: background 0.2s;
        }
        .action-btn.green { background: #28a745; }
        .action-btn.red { background: #dc3545; }

        /* STUDIO EDITOR UI */
        #studio-workspace-view { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; background: #1e1e24; z-index: 400; }
        #studio-canvas-container { width: 100%; height: 100%; position: absolute; top:0; left:0; }
        
        #studio-top-ribbon { position: absolute; top: 5px; left: 5px; right: 5px; background: rgba(22, 31, 48, 0.9); border-radius: 8px; padding: 8px; display: flex; gap: 8px; flex-wrap: wrap; z-index: 410; align-items: center; }
        .ribbon-group { display: flex; gap: 4px; border-right: 1px solid rgba(255,255,255,0.1); padding-right: 8px; align-items: center;}
        .studio-btn { background: #2d3b54; border: none; color: white; padding: 6px 10px; border-radius: 4px; font-size: 11px; font-weight: bold; cursor: pointer; }
        .studio-btn.active-tool { background: #00e5ff; color: #0b0e14; }
        .studio-btn.play-btn { background: #28a745; }
        
        #studio-sidebar-right { position: absolute; top: 70px; right: 5px; bottom: 5px; width: 220px; background: rgba(22, 31, 48, 0.95); border-radius: 8px; display: flex; flex-direction: column; padding: 10px; box-sizing: border-box; z-index: 410; pointer-events: auto; overflow-y: auto;}
        
        /* STUDIO MOBILE TRANSFORM PAD */
        #studio-mobile-pad {
            position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%);
            background: rgba(11, 14, 20, 0.85); padding: 10px; border-radius: 12px;
            display: flex; gap: 15px; z-index: 415; border: 1px solid rgba(255,255,255,0.2);
            text-align: center; font-size: 10px; font-weight: bold; color: #a2b4d6;
        }
        .pad-col { display: flex; flex-direction: column; gap: 5px; align-items: center; }
        .pad-btn { width: 45px; height: 45px; background: #2d3b54; border: 2px solid #3e5275; border-radius: 8px; color: #fff; font-size: 16px; font-weight: bold; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .pad-btn:active { background: #00e5ff; color: #000; border-color: #00e5ff; }

        .explorer-tree { flex: 1; background: #0b0e14; border-radius: 4px; overflow-y: auto; padding: 6px; font-size: 11px; margin-bottom: 10px; min-height: 100px; }
        .tree-node { padding: 4px; border-radius: 3px; cursor: pointer; margin-bottom: 2px; }
        .tree-node.selected-node { background: #00e5ff; color: #0b0e14; font-weight: bold; }
        .property-dock { background: #0b0e14; border-radius: 4px; padding: 8px; font-size: 11px; }

        /* RUNTIME VIEWPORT AND OVERLAYS */
        #game-container { width: 100%; height: 100%; display: none; position: relative; }
        #game-overlay-hud { position: absolute; top: 10px; left: 10px; pointer-events: none; z-index: 100; text-shadow: 1px 1px 2px black; font-size: 12px; line-height: 1.4; }
        #btn-leave-room { position: absolute; top: 10px; right: 10px; background: rgba(220,53,69,0.9); color: white; border: none; padding: 10px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; z-index: 100; }

        /* SERVER CHAT */
        #in-game-chat { position: absolute; bottom: 150px; left: 10px; width: 280px; height: 180px; background: rgba(11,14,20,0.75); border-radius: 8px; z-index: 90; display: flex; flex-direction: column; border: 1px solid rgba(255,255,255,0.1); }
        .chat-messages { flex: 1; padding: 10px; overflow-y: auto; font-size: 12px; }
        .chat-line { margin-bottom: 4px; line-height: 1.4; }

        /* MOBILE CONTROLS */
        #mobile-ui { display: none; }
        .mobile-btn {
            background: rgba(255, 255, 255, 0.25); border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%; color: white; font-family: sans-serif; font-weight: bold;
            display: flex; align-items: center; justify-content: center; z-index: 10; position: absolute;
        }
        #joystick-zone { position: absolute; bottom: 30px; left: 30px; width: 100px; height: 100px; background: rgba(255, 255, 255, 0.15); border-radius: 50%; border: 2px solid rgba(255, 255, 255, 0.3); z-index: 10; }
        #joystick-knob { position: absolute; top: 25px; left: 25px; width: 50px; height: 50px; background: rgba(255, 255, 255, 0.65); border-radius: 50%; pointer-events: none; }
        #jump-btn { bottom: 40px; right: 20px; width: 70px; height: 70px; }
        #zoom-in-btn { top: 60px; right: 10px; width: 42px; height: 42px; font-size: 22px;}
        #zoom-out-btn { top: 110px; right: 10px; width: 42px; height: 42px; font-size: 22px;}
        #crosshair { position: absolute; top: 50%; left: 50%; width: 8px; height: 8px; background: white; border-radius: 50%; transform: translate(-50%, -50%); display: none; pointer-events: none; z-index: 50; }
    </style>
</head>
<body>

    <div id="homepage-launcher">
        <div id="sidebar">
            <div class="logo-area">RO-BOX Net</div>
            <button class="nav-btn active" id="tab-btn-games" onclick="switchTab('games')">Play Games</button>
            <button class="nav-btn" id="tab-btn-studio" onclick="switchTab('studio')">Create Studio</button>
            <button class="nav-btn" id="tab-btn-profile" onclick="switchTab('profile')">My Account</button>
        </div>

        <div id="main-content">
            <div id="panel-games" class="view-panel active">
                <h2>Global Server Registry</h2>
                <div class="games-grid" id="gamesDiscoveryGrid"></div>
            </div>

            <div id="panel-studio" class="view-panel">
                <h2>Creator Studio</h2>
                <div class="form-box" style="max-width:100%;">
                    <label style="font-size:12px; color:#00e5ff; font-weight:bold;">BUILD NEW WORLD</label>
                    <div class="input-row" style="flex-direction:column; gap:12px; margin-top:8px;">
                        <input type="text" id="studioNewGameTitle" placeholder="Enter game title...">
                        <textarea id="studioNewGameDesc" placeholder="Enter game description..." rows="2"></textarea>
                        <button class="action-btn green" onclick="openStudioEditorEngine()">Start Building</button>
                    </div>
                </div>
            </div>

            <div id="panel-profile" class="view-panel">
                <h2>Account Settings</h2>
                <div class="form-box">
                    <label style="font-size:12px; color:#a2b4d6; font-weight:bold;">USERNAME</label>
                    <div class="input-row">
                        <input type="text" id="usernameInput" placeholder="Enter name...">
                        <button class="action-btn" onclick="tryUpdateUsername()">Save</button>
                    </div>
                </div>
            </div>

            <div style="margin-top: auto; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.05); font-size: 12px; color:#a2b4d6;">
                Status: <span id="networkConnectionStatus" style="color:#ffaa00; font-weight:bold;">Connecting to Broker...</span>
            </div>
        </div>
    </div>

    <div id="game-info-overlay">
        <div class="info-page-box">
            <div class="info-header">
                <div>
                    <div class="info-title" id="lblInfoTitle">Game Title</div>
                    <div class="info-meta">By: <span id="lblInfoCreator" style="color:#fff; font-weight:bold;">System</span></div>
                </div>
                <button class="action-btn" style="background:transparent; color:#a2b4d6; font-size:20px; padding:0;" onclick="closeGameInfoOverlay()">✕</button>
            </div>
            <div class="info-body" id="lblInfoDescription">No description.</div>

            <div class="info-footer-actions">
                <button class="action-btn green" style="width:100%; font-size:18px; padding:15px;" onclick="launchActiveWorld()">▶ PLAY NOW</button>
                <button id="btnDeleteGame" class="action-btn red" style="width:100%; display:none;" onclick="deletePublishedGame()">Delete This Game</button>
            </div>
        </div>
    </div>

    <div id="studio-workspace-view">
        <div id="studio-canvas-container"></div>
        
        <div id="studio-top-ribbon">
            <div class="ribbon-group">
                <button class="studio-btn" style="background:#dc3545;" onclick="exitStudioEditorEngine()">Exit</button>
            </div>
            <div class="ribbon-group">
                <button class="studio-btn" onclick="undoStudio()">⟲ Undo</button>
                <button class="studio-btn" onclick="redoStudio()">⟳ Redo</button>
            </div>
            <div class="ribbon-group">
                <button class="studio-btn active-tool" id="tool-btn-select" onclick="setStudioTool('select')">Select</button>
                <button class="studio-btn" id="tool-btn-move" onclick="setStudioTool('move')">Move</button>
                <button class="studio-btn" id="tool-btn-scale" onclick="setStudioTool('scale')">Scale</button>
                <button class="studio-btn" id="tool-btn-rotate" onclick="setStudioTool('rotate')">Rotate</button>
            </div>
            <div class="ribbon-group">
                <button class="studio-btn" onclick="studioInsertPart('box')">+ Part</button>
                <button class="studio-btn" onclick="studioInsertPart('spawn')">+ Spawn</button>
                <button class="studio-btn" style="background:#dc3545;" onclick="studioDeleteSelectedObjectNode()">🗑 Del</button>
            </div>
            <div class="ribbon-group" style="border-right:none; margin-left:auto;">
                <button class="studio-btn play-btn" id="studio-playtest-btn" onclick="toggleStudioPlayTest()">▶ Test</button>
                <button class="studio-btn" style="background:#007bff;" onclick="studioPublishActiveGame()">Publish</button>
            </div>
        </div>

        <div id="studio-sidebar-right">
            <div style="font-size: 11px; font-weight: bold; color: #00e5ff; margin-bottom: 5px;">Explorer</div>
            <div class="explorer-tree" id="studioExplorerTree"></div>
            
            <div style="font-size: 11px; font-weight: bold; color: #00e5ff; margin-bottom: 5px;">Properties</div>
            <div class="property-dock" id="studioPropertiesDock"></div>
        </div>

        <div id="studio-mobile-pad">
            <div class="pad-col">
                X-Axis
                <div style="display:flex; gap:5px;">
                    <div class="pad-btn" onclick="mobileTransform('x', -1)">-</div>
                    <div class="pad-btn" onclick="mobileTransform('x', 1)">+</div>
                </div>
            </div>
            <div class="pad-col">
                Y-Axis
                <div style="display:flex; gap:5px;">
                    <div class="pad-btn" onclick="mobileTransform('y', -1)">-</div>
                    <div class="pad-btn" onclick="mobileTransform('y', 1)">+</div>
                </div>
            </div>
            <div class="pad-col">
                Z-Axis
                <div style="display:flex; gap:5px;">
                    <div class="pad-btn" onclick="mobileTransform('z', -1)">-</div>
                    <div class="pad-btn" onclick="mobileTransform('z', 1)">+</div>
                </div>
            </div>
        </div>
    </div>

    <div id="game-container">
        <button id="btn-leave-room" onclick="exitWorldEngine()">LEAVE</button>
        <div id="game-overlay-hud">
            Server: <span id="lblInGameServerName" style="color:#00e5ff; font-weight:bold;">None</span><br>
            Drag joystick / WASD to move. Drag screen / Right-Click to look.
        </div>

        <div id="in-game-chat">
            <div class="chat-messages" id="ingameChatBox"></div>
            <div style="display:flex; padding:5px; background:rgba(0,0,0,0.45);">
                <input type="text" id="ingameChatInput" placeholder="Press Enter to chat..." style="padding:6px; font-size:12px; width:100%; border-radius:4px; border:none;" onkeydown="if(event.key==='Enter') sendIngameChatMessage()">
            </div>
        </div>

        <div id="crosshair"></div>
        <div id="mobile-ui">
            <div id="joystick-zone" class="virtual-joystick-area"><div id="joystick-knob"></div></div>
            <div id="jump-btn" class="mobile-btn virtual-joystick-area">JUMP</div>
            <div id="zoom-in-btn" class="mobile-btn virtual-joystick-area">+</div>
            <div id="zoom-out-btn" class="mobile-btn virtual-joystick-area">-</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>

    <script>
        // --- CORE STATE ---
        let localPlayerName = localStorage.getItem('robox_username') || "Creator_" + Math.floor(1000 + Math.random() * 9000);
        document.getElementById('usernameInput').value = localPlayerName;

        let globalDatabaseGames = [
            { id: "sandbox", title: "Arena Sandbox", desc: "Default physics test sandbox.", creator: "System Core", components: [{type:"box", px:0, py:0.5, pz:0, sx:2, sy:1, sz:2, rx:0, ry:0, rz:0}, {type:"spawn", px:0, py:0.1, pz:4, sx:3, sy:0.2, sz:3, rx:0, ry:0, rz:0}] }
        ];

        let targetLobbyActiveObject = null;
        let serverIsolatedChatLogHistory = {};

        // Anti-scroll for canvas specifically
        window.addEventListener('wheel', (e) => { if(document.getElementById('game-container').style.display === 'block' || document.getElementById('studio-workspace-view').style.display === 'block') e.preventDefault(); }, { passive: false });

        // --- NETWORK: GLOBAL MQTT BROKER ---
        const runtimeClientId = "rbx4_" + Math.random().toString(36).substring(2, 9);
        const remotePlayers = new Map();
        const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt', { clientId: runtimeClientId, clean: true, connectTimeout: 5000 });

        client.on('connect', () => {
            document.getElementById('networkConnectionStatus').innerText = "Connected globally via MQTT";
            document.getElementById('networkConnectionStatus').style.color = "#00ffca";
            client.subscribe('robox3d_v4/global/games/#', { qos: 1 });
            rebuildPlatformGameDisplayGrids();
        });

        client.on('message', (topic, payload) => {
            try {
                // Handle Global Game Syncing 
                if (topic.startsWith('robox3d_v4/global/games/')) {
                    const gameId = topic.split('/').pop();
                    const payloadStr = payload.toString();
                    
                    if (payloadStr.length === 0) {
                        globalDatabaseGames = globalDatabaseGames.filter(g => g.id !== gameId);
                    } else {
                        const parsed = JSON.parse(payloadStr);
                        if (parsed._delete) {
                            globalDatabaseGames = globalDatabaseGames.filter(g => g.id !== gameId);
                        } else {
                            const idx = globalDatabaseGames.findIndex(g => g.id === parsed.id);
                            if (idx >= 0) globalDatabaseGames[idx] = parsed;
                            else globalDatabaseGames.push(parsed);
                        }
                    }
                    rebuildPlatformGameDisplayGrids();
                    return;
                }

                // Chat Pipeline
                if (topic.startsWith('robox3d_v4/rooms/') && topic.endsWith('/chat')) {
                    const roomId = topic.split('/')[2];
                    const parsed = JSON.parse(payload.toString());
                    if (!serverIsolatedChatLogHistory[roomId]) serverIsolatedChatLogHistory[roomId] = [];
                    serverIsolatedChatLogHistory[roomId].push(parsed);
                    if (serverIsolatedChatLogHistory[roomId].length > 40) serverIsolatedChatLogHistory[roomId].shift();
                    
                    if (currentActiveRoomId === roomId) renderInGameChatInterface(roomId);
                    return;
                }

                // 3D Player Positions
                if (topic.startsWith('robox3d_v4/rooms/') && topic.includes('/positions/')) {
                    const roomParts = topic.split('/');
                    const roomId = roomParts[2];
                    const trackingSenderId = roomParts[4];
                    if (trackingSenderId === runtimeClientId || roomId !== currentActiveRoomId) return;

                    const parsed = JSON.parse(payload.toString());
                    if (!remotePlayers.has(trackingSenderId)) {
                        const mesh = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), new THREE.MeshLambertMaterial({ color: 0x00ff7f }));
                        activeEngineSceneReference?.add(mesh);
                        remotePlayers.set(trackingSenderId, {
                            mesh: mesh, name: parsed.name,
                            targetPos: new THREE.Vector3(parsed.x, parsed.y, parsed.z),
                            targetQuat: new THREE.Quaternion(parsed.qx, parsed.qy, parsed.qz, parsed.qw),
                            lastUpdate: Date.now()
                        });
                    } else {
                        const instance = remotePlayers.get(trackingSenderId);
                        instance.targetPos.set(parsed.x, parsed.y, parsed.z);
                        instance.targetQuat.set(parsed.qx, parsed.qy, parsed.qz, parsed.qw);
                        instance.lastUpdate = Date.now();
                    }
                }
            } catch (err) {}
        });

        // --- DASHBOARD UI ---
        function switchTab(targetTab) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.view-panel').forEach(p => p.classList.remove('active'));
            document.getElementById('tab-btn-' + targetTab).classList.add('active');
            document.getElementById('panel-' + targetTab).classList.add('active');
        }

        function rebuildPlatformGameDisplayGrids() {
            const discGrid = document.getElementById('gamesDiscoveryGrid');
            discGrid.innerHTML = '';

            globalDatabaseGames.forEach(game => {
                const card = document.createElement('div');
                card.className = "game-card";
                card.onclick = () => openGameInfoOverlay(game);
                
                let emoji = "🎮";
                if(game.id==="sandbox") emoji="🏝️";
                card.innerHTML = `<div class="game-thumb">${emoji}</div><div class="game-title">${game.title}</div><div class="game-creator">By ${game.creator}</div>`;
                discGrid.appendChild(card);
            });
        }

        function openGameInfoOverlay(game) {
            targetLobbyActiveObject = game;
            document.getElementById('lblInfoTitle').innerText = game.title;
            document.getElementById('lblInfoCreator').innerText = game.creator;
            document.getElementById('lblInfoDescription').innerText = game.desc || "No description.";
            
            if(game.creator === localPlayerName && game.id !== "sandbox") {
                document.getElementById('btnDeleteGame').style.display = 'block';
            } else {
                document.getElementById('btnDeleteGame').style.display = 'none';
            }
            document.getElementById('game-info-overlay').style.display = "flex";
        }

        function closeGameInfoOverlay() {
            document.getElementById('game-info-overlay').style.display = "none";
        }

        function tryUpdateUsername() {
            const r = document.getElementById('usernameInput').value.trim();
            if (r.length < 3) return alert("Name too short!");
            localPlayerName = r;
            localStorage.setItem('robox_username', localPlayerName);
            alert("Name saved!");
        }

        function deletePublishedGame() {
            if(!targetLobbyActiveObject) return;
            if(confirm("Are you sure you want to permanently delete this game from global servers?")) {
                client.publish(`robox3d_v4/global/games/${targetLobbyActiveObject.id}`, "", { retain: true, qos: 1 });
                client.publish(`robox3d_v4/global/games/${targetLobbyActiveObject.id}`, JSON.stringify({id: targetLobbyActiveObject.id, _delete: true}), { retain: true, qos: 1 });
                closeGameInfoOverlay();
                targetLobbyActiveObject = null;
            }
        }

        // --- STUDIO EDITOR ENGINE ---
        let studioCurrentScene = null, studioCurrentCamera = null, studioCurrentRenderer = null;
        let studioAnimationId = null;
        let studioWorkspaceObjectsArray = [];
        let studioSelectedMeshReference = null;
        let studioActiveToolMode = 'select'; 
        let studioKeysPressedMap = {};
        let studioEditorPlayTestActiveState = false;
        
        let studioRaycaster = new THREE.Raycaster();
        let studioPointerVector = new THREE.Vector2();

        // Undo/Redo Architecture
        let studioHistory = [];
        let studioHistoryIndex = -1;

        function saveStudioState() {
            if(studioEditorPlayTestActiveState) return;
            const state = studioWorkspaceObjectsArray.map(m => ({
                type: m.userData.type, id: m.userData.id,
                px: m.position.x, py: m.position.y, pz: m.position.z,
                sx: m.scale.x, sy: m.scale.y, sz: m.scale.z,
                rx: m.rotation.x, ry: m.rotation.y, rz: m.rotation.z
            }));
            
            if (studioHistoryIndex < studioHistory.length - 1) studioHistory = studioHistory.slice(0, studioHistoryIndex + 1);
            studioHistory.push(JSON.stringify(state));
            studioHistoryIndex++;
        }

        function undoStudio() {
            if(studioEditorPlayTestActiveState || studioHistoryIndex <= 0) return;
            studioHistoryIndex--;
            loadStudioStateFromHistory(JSON.parse(studioHistory[studioHistoryIndex]));
        }

        function redoStudio() {
            if(studioEditorPlayTestActiveState || studioHistoryIndex >= studioHistory.length - 1) return;
            studioHistoryIndex++;
            loadStudioStateFromHistory(JSON.parse(studioHistory[studioHistoryIndex]));
        }

        function loadStudioStateFromHistory(stateArr) {
            studioWorkspaceObjectsArray.forEach(m => studioCurrentScene.remove(m));
            studioWorkspaceObjectsArray = [];
            studioSelectedMeshReference = null;
            
            stateArr.forEach(comp => {
                let geo = new THREE.BoxGeometry(1,1,1);
                let mat = new THREE.MeshLambertMaterial({ color: comp.type==='spawn'?0xffaa00:0x5c6e8e });
                if(comp.type==='spawn') { mat.transparent = true; mat.opacity = 0.8; }
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.set(comp.px, comp.py, comp.pz);
                mesh.scale.set(comp.sx, comp.sy, comp.sz);
                mesh.rotation.set(comp.rx, comp.ry, comp.rz);
                mesh.userData = { id: comp.id, type: comp.type };
                studioCurrentScene.add(mesh);
                studioWorkspaceObjectsArray.push(mesh);
            });
            rebuildStudioExplorerTreeDOM();
            renderStudioPropertiesInspectorDock();
        }

        function openStudioEditorEngine() {
            document.getElementById('homepage-launcher').style.display = 'none';
            document.getElementById('studio-workspace-view').style.display = 'block';

            studioCurrentScene = new THREE.Scene();
            studioCurrentScene.background = new THREE.Color(0x1e1e24);
            studioCurrentScene.add(new THREE.GridHelper(60, 60, 0x00ffca, 0x44445c));
            studioCurrentScene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const dl = new THREE.DirectionalLight(0xffffff, 0.6); dl.position.set(20,40,20); studioCurrentScene.add(dl);

            studioCurrentCamera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            studioCurrentCamera.position.set(0, 5, 10);
            studioCurrentCamera.lookAt(0,0,0);

            studioCurrentRenderer = new THREE.WebGLRenderer({ antialias: true });
            studioCurrentRenderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('studio-canvas-container').appendChild(studioCurrentRenderer.domElement);

            studioWorkspaceObjectsArray = [];
            studioHistory = [];
            studioHistoryIndex = -1;
            studioSelectedMeshReference = null;
            studioEditorPlayTestActiveState = false;

            studioInsertPart('spawn', false);
            saveStudioState(); // Base state

            window.addEventListener('resize', onStudioViewportResize);
            studioCurrentRenderer.domElement.addEventListener('pointerdown', onStudioPointerDown);
            document.addEventListener('keydown', e => studioKeysPressedMap[e.key.toLowerCase()] = true);
            document.addEventListener('keyup', e => studioKeysPressedMap[e.key.toLowerCase()] = false);

            runStudioLoopCycle();
        }

        function onStudioViewportResize() {
            if(!studioCurrentCamera) return;
            studioCurrentCamera.aspect = window.innerWidth / window.innerHeight;
            studioCurrentCamera.updateProjectionMatrix();
            studioCurrentRenderer.setSize(window.innerWidth, window.innerHeight);
        }

        function setStudioTool(toolName) {
            studioActiveToolMode = toolName;
            document.querySelectorAll('.studio-btn').forEach(b => {
                if(b.id && b.id.startsWith('tool-btn-')) b.classList.remove('active-tool');
            });
            document.getElementById('tool-btn-'+toolName).classList.add('active-tool');
        }

        function studioInsertPart(type, doSave = true) {
            if(studioEditorPlayTestActiveState) return;
            let geo = new THREE.BoxGeometry(1,1,1);
            let mat = new THREE.MeshLambertMaterial({ color: type==='spawn'?0xffaa00:0x5c6e8e });
            if(type==='spawn') { mat.transparent = true; mat.opacity = 0.8; }
            
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(0, 0.5, 0);
            mesh.scale.set(type==='spawn'?3:1, type==='spawn'?0.2:1, type==='spawn'?3:1);
            mesh.userData = { id: "p_" + Math.random().toString(36).substring(2,7), type: type };
            
            studioCurrentScene.add(mesh);
            studioWorkspaceObjectsArray.push(mesh);
            rebuildStudioExplorerTreeDOM();
            if(doSave) saveStudioState();
        }

        function studioDeleteSelectedObjectNode() {
            if(!studioSelectedMeshReference || studioEditorPlayTestActiveState) return;
            studioCurrentScene.remove(studioSelectedMeshReference);
            studioWorkspaceObjectsArray = studioWorkspaceObjectsArray.filter(item => item !== studioSelectedMeshReference);
            studioSelectedMeshReference = null;
            rebuildStudioExplorerTreeDOM();
            renderStudioPropertiesInspectorDock();
            saveStudioState();
        }

        function onStudioPointerDown(e) {
            if(studioActiveToolMode === 'select' && !studioEditorPlayTestActiveState) {
                studioPointerVector.x = (e.clientX / window.innerWidth) * 2 - 1;
                studioPointerVector.y = -(e.clientY / window.innerHeight) * 2 + 1;
                studioRaycaster.setFromCamera(studioPointerVector, studioCurrentCamera);
                
                const intersections = studioRaycaster.intersectObjects(studioWorkspaceObjectsArray);
                selectStudioMeshNode(intersections.length > 0 ? intersections[0].object : null);
            }
        }

        function selectStudioMeshNode(mesh) {
            if(studioSelectedMeshReference && studioSelectedMeshReference.clear) {
                studioSelectedMeshReference.remove(studioSelectedMeshReference.getObjectByName("wireframe_selector"));
            }
            studioSelectedMeshReference = mesh;
            if(mesh) {
                const selector = new THREE.Mesh(new THREE.BoxGeometry(1.02, 1.02, 1.02), new THREE.MeshBasicMaterial({ color: 0xffff00, wireframe: true }));
                selector.name = "wireframe_selector";
                studioSelectedMeshReference.add(selector);
            }
            rebuildStudioExplorerTreeDOM();
            renderStudioPropertiesInspectorDock();
        }

        // TOUCH FRIENDLY TRANSFORM ENGINE
        function mobileTransform(axis, dir) {
            if(!studioSelectedMeshReference || studioEditorPlayTestActiveState) return;
            let delta = dir > 0 ? 1 : -1;
            let prop = '';
            
            if(studioActiveToolMode === 'move') { prop = 'p' + axis; delta *= 0.5; }
            else if(studioActiveToolMode === 'scale') { prop = 's' + axis; delta *= 0.5; }
            else if(studioActiveToolMode === 'rotate') { prop = 'r' + axis; delta *= 0.2; }
            else return; 
            
            modifyActiveProp(prop, delta);
            saveStudioState();
        }

        function modifyActiveProp(prop, delta) {
            if(!studioSelectedMeshReference || studioEditorPlayTestActiveState) return;
            const m = studioSelectedMeshReference;
            if(prop==='px') m.position.x += delta;
            if(prop==='py') m.position.y += delta;
            if(prop==='pz') m.position.z += delta;
            if(prop==='sx') m.scale.x = Math.max(0.1, m.scale.x + delta);
            if(prop==='sy') m.scale.y = Math.max(0.1, m.scale.y + delta);
            if(prop==='sz') m.scale.z = Math.max(0.1, m.scale.z + delta);
            if(prop==='rx') m.rotation.x += delta;
            if(prop==='ry') m.rotation.y += delta;
            if(prop==='rz') m.rotation.z += delta;
            renderStudioPropertiesInspectorDock();
        }

        function rebuildStudioExplorerTreeDOM() {
            const tree = document.getElementById('studioExplorerTree');
            tree.innerHTML = '';
            studioWorkspaceObjectsArray.forEach(mesh => {
                const node = document.createElement('div');
                node.className = "tree-node" + (studioSelectedMeshReference === mesh ? " selected-node" : "");
                node.innerText = `📦 ${mesh.userData.type} (${mesh.userData.id})`;
                node.onclick = () => selectStudioMeshNode(mesh);
                tree.appendChild(node);
            });
        }

        function renderStudioPropertiesInspectorDock() {
            const dock = document.getElementById('studioPropertiesDock');
            if(!studioSelectedMeshReference) {
                dock.innerHTML = `<span style="color:#6c7e9c; font-style:italic;">No object selected.</span>`;
                return;
            }
            const m = studioSelectedMeshReference;
            dock.innerHTML = `
                <div>Pos: ${m.position.x.toFixed(1)}, ${m.position.y.toFixed(1)}, ${m.position.z.toFixed(1)}</div>
                <div>Scale: ${m.scale.x.toFixed(1)}, ${m.scale.y.toFixed(1)}, ${m.scale.z.toFixed(1)}</div>
                <div>Rot(y): ${m.rotation.y.toFixed(1)}</div>
            `;
        }

        function runStudioLoopCycle() {
            if(!studioCurrentScene) return;
            studioAnimationId = requestAnimationFrame(runStudioLoopCycle);

            if(!studioEditorPlayTestActiveState) {
                let fwd = (studioKeysPressedMap['w']?1:0) - (studioKeysPressedMap['s']?1:0);
                let side = (studioKeysPressedMap['d']?1:0) - (studioKeysPressedMap['a']?1:0);
                
                const lookVector = new THREE.Vector3(); studioCurrentCamera.getWorldDirection(lookVector);
                const rightVector = new THREE.Vector3().crossVectors(lookVector, studioCurrentCamera.up).normalize();

                studioCurrentCamera.position.addScaledVector(lookVector, fwd * 0.2);
                studioCurrentCamera.position.addScaledVector(rightVector, side * 0.2);
            } else if(window._studioTestCharacterMesh) {
                let mFwd = (studioKeysPressedMap['w']?1:0) - (studioKeysPressedMap['s']?1:0);
                let mSide = (studioKeysPressedMap['d']?1:0) - (studioKeysPressedMap['a']?1:0);
                window._studioTestCharacterMesh.position.x += mSide * 0.15;
                window._studioTestCharacterMesh.position.z -= mFwd * 0.15;
                
                window._studioTestCharacterMesh.position.y += window._testVelocityY || 0;
                if(window._studioTestCharacterMesh.position.y <= 0.5) { window._studioTestCharacterMesh.position.y = 0.5; window._testVelocityY = 0; } 
                else { window._testVelocityY = (window._testVelocityY || 0) - 0.015; }

                if(studioKeysPressedMap[' '] && window._studioTestCharacterMesh.position.y <= 0.5) window._testVelocityY = 0.35;

                studioCurrentCamera.position.set(window._studioTestCharacterMesh.position.x, window._studioTestCharacterMesh.position.y + 4, window._studioTestCharacterMesh.position.z + 7);
                studioCurrentCamera.lookAt(window._studioTestCharacterMesh.position);
            }
            studioCurrentRenderer.render(studioCurrentScene, studioCurrentCamera);
        }

        function toggleStudioPlayTest() {
            const btn = document.getElementById('studio-playtest-btn');
            if(!studioEditorPlayTestActiveState) {
                studioEditorPlayTestActiveState = true;
                selectStudioMeshNode(null);
                btn.innerText = "⏹ Stop"; btn.style.background = "#dc3545";
                
                let spawnPos = new THREE.Vector3(0, 0.5, 0);
                studioWorkspaceObjectsArray.forEach(m => { if(m.userData.type === 'spawn') spawnPos.set(m.position.x, m.position.y+0.6, m.position.z); });

                window._studioTestCharacterMesh = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1, 0.8), new THREE.MeshLambertMaterial({ color: 0xff0000 }));
                window._studioTestCharacterMesh.position.copy(spawnPos);
                studioCurrentScene.add(window._studioTestCharacterMesh);
                window._testVelocityY = 0;
            } else {
                studioEditorPlayTestActiveState = false;
                btn.innerText = "▶ Test"; btn.style.background = "#28a745";
                if(window._studioTestCharacterMesh) studioCurrentScene.remove(window._studioTestCharacterMesh);
                studioCurrentCamera.position.set(0, 5, 10);
                studioCurrentCamera.lookAt(0,0,0);
            }
        }

        function studioPublishActiveGame() {
            const title = document.getElementById('studioNewGameTitle').value.trim() || "User Build " + Math.floor(100 + Math.random()*900);
            const desc = document.getElementById('studioNewGameDesc').value.trim() || "Custom arena.";
            
            const componentsPayload = studioWorkspaceObjectsArray.map(m => ({
                type: m.userData.type,
                px: m.position.x, py: m.position.y, pz: m.position.z,
                sx: m.scale.x, sy: m.scale.y, sz: m.scale.z,
                rx: m.rotation.x, ry: m.rotation.y, rz: m.rotation.z
            }));

            const compiledGameObject = { id: "usr_" + Math.random().toString(36).substring(2,7), title: title, desc: desc, creator: localPlayerName, components: componentsPayload };

            client.publish(`robox3d_v4/global/games/${compiledGameObject.id}`, JSON.stringify(compiledGameObject), { retain: true, qos: 1 });
            
            alert("✓ Game successfully published globally!");
            exitStudioEditorEngine();
        }

        function exitStudioEditorEngine() {
            cancelAnimationFrame(studioAnimationId);
            if(studioCurrentRenderer) { studioCurrentRenderer.dispose(); studioCurrentRenderer.domElement.remove(); }
            studioCurrentScene = null; studioCurrentCamera = null; studioCurrentRenderer = null;
            document.getElementById('studio-workspace-view').style.display = 'none';
            document.getElementById('homepage-launcher').style.display = 'flex';
        }

        // --- ACTIVE GAME ENGINE (MULTIPLAYER) ---
        let activeEngineSceneReference = null, currentActiveRoomId = null;
        let gameAnimationFrameHandle = null, gameNetworkIntervalHandle = null;

        function launchActiveWorld() {
            if(!targetLobbyActiveObject) return;
            
            // Extract data BEFORE closing the overlay!
            currentActiveRoomId = targetLobbyActiveObject.id;
            const gameTitle = targetLobbyActiveObject.title;
            const gameComponents = targetLobbyActiveObject.components;
            
            closeGameInfoOverlay(); // Safely close UI
            targetLobbyActiveObject = null; // Clean up memory reference

            document.getElementById('homepage-launcher').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            document.getElementById('lblInGameServerName').innerText = gameTitle;

            initActiveGameSimulationViewport(gameComponents);
        }

        // Chat logic for active games
        function sendIngameChatMessage() {
            const field = document.getElementById('ingameChatInput');
            const txt = field.value.trim();
            if (!txt || !currentActiveRoomId) return;
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            client.publish(`robox3d_v4/rooms/${currentActiveRoomId}/chat`, JSON.stringify({ time: time, user: localPlayerName, text: txt }));
            field.value = '';
        }

        function renderInGameChatInterface(roomId) {
            const logs = serverIsolatedChatLogHistory[roomId] || [];
            const container = document.getElementById('ingameChatBox');
            container.innerHTML = '';
            logs.forEach(msg => {
                const row = document.createElement('div');
                row.className = "chat-line";
                row.innerHTML = `<span style="color:#5c6e8e;">[${msg.time}]</span> <span style="color:#00e5ff; font-weight:bold;">${msg.user}:</span> ${msg.text}`;
                container.appendChild(row);
            });
            container.scrollTop = container.scrollHeight;
        }

        function initActiveGameSimulationViewport(componentsData) {
            const scene = new THREE.Scene();
            activeEngineSceneReference = scene;
            scene.background = new THREE.Color(0x87ceeb); scene.fog = new THREE.Fog(0x87ceeb, 15, 65);

            const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('game-container').appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.85));
            const sun = new THREE.DirectionalLight(0xffffff, 0.8); sun.position.set(20,40,20); scene.add(sun);
            scene.add(new THREE.GridHelper(100, 50, 0x000000, 0xffffff));
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(120,120), new THREE.MeshLambertMaterial({ color: 0x3e6e4f })); 
            ground.rotation.x = -Math.PI/2; ground.position.y = -0.01; scene.add(ground);

            let spawnCoordinatesVector = new THREE.Vector3(Math.random()*4-2, 0.5, Math.random()*4-2);
            
            if(componentsData) {
                componentsData.forEach(comp => {
                    let geo = new THREE.BoxGeometry(1,1,1);
                    let mat = new THREE.MeshLambertMaterial({ color: comp.type==='spawn'?0xffaa00:0x6e7f9c });
                    if(comp.type==='spawn') { mat.transparent = true; mat.opacity = 0.4; spawnCoordinatesVector.set(comp.px, comp.py + 0.6, comp.pz); } 
                    const m = new THREE.Mesh(geo, mat);
                    m.position.set(comp.px, comp.py, comp.pz);
                    m.scale.set(comp.sx, comp.sy, comp.sz);
                    m.rotation.set(comp.rx, comp.ry, comp.rz);
                    scene.add(m);
                });
            }

            const characterGroupNode = new THREE.Group();
            characterGroupNode.position.copy(spawnCoordinatesVector);
            scene.add(characterGroupNode);
            characterGroupNode.add(new THREE.Mesh(new THREE.BoxGeometry(1,1,1), new THREE.MeshLambertMaterial({ color: 0xff0000 })));

            client.subscribe(`robox3d_v4/rooms/${currentActiveRoomId}/positions/#`, { qos: 0 });
            client.subscribe(`robox3d_v4/rooms/${currentActiveRoomId}/chat`, { qos: 0 });
            renderInGameChatInterface(currentActiveRoomId);

            // Desktop & Mobile Inputs
            let yaw = 0; let pitch = -0.2; let isRightMouseDown = false; 
            let targetZoom = 6; let actualZoom = 6; const maxZoom = 15;
            let inputX = 0; let inputY = 0; let velocityY = 0; let isGrounded = true; const jumpStrength = 0.35;
            const keys = { w: false, a: false, s: false, d: false };
            
            // KEYBOARD
            const onKeyD = (e) => {
                if (keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true;
                if (e.code === 'Space' && isGrounded) { velocityY = jumpStrength; isGrounded = false; }
                if (e.key === '-' || e.key === '_') targetZoom = Math.min(maxZoom, targetZoom + 1);
                if (e.key === '=' || e.key === '+') targetZoom = Math.max(0, targetZoom - 1);
            };
            const onKeyU = (e) => { if (keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; };
            document.addEventListener('keydown', onKeyD); 
            document.addEventListener('keyup', onKeyU);
            
            // MOUSE (DESKTOP LOOK)
            const onMouseD = (e) => { if (e.button === 2) isRightMouseDown = true; if (actualZoom < 0.5 && e.target === renderer.domElement) document.body.requestPointerLock(); };
            const onMouseU = (e) => { if (e.button === 2) isRightMouseDown = false; };
            const onMouseM = (e) => {
                if (document.pointerLockElement === document.body || isRightMouseDown) {
                    yaw -= e.movementX * 0.004; pitch -= e.movementY * 0.004;
                    pitch = Math.max(-Math.PI/2 + 0.1, Math.min(Math.PI/2 - 0.1, pitch));
                }
            };
            const onWheel = (e) => { targetZoom = Math.max(0, Math.min(maxZoom, targetZoom + (e.deltaY > 0 ? 1 : -1))); };
            
            document.addEventListener('mousedown', onMouseD); document.addEventListener('mouseup', onMouseU);
            document.addEventListener('mousemove', onMouseM); document.addEventListener('wheel', onWheel, {passive: true});

            // TOUCH (MOBILE JOYSTICK, JUMP, LOOK & ZOOM)
            if ('ontouchstart' in window || navigator.maxTouchPoints > 0) { document.getElementById('mobile-ui').style.display = 'block'; }
            const joystickZone = document.getElementById('joystick-zone'); const joystickKnob = document.getElementById('joystick-knob');
            let jCenter = {x:0, y:0}, activeJTouchId = null;

            joystickZone.addEventListener('touchstart', e => {
                const t = e.changedTouches[0]; activeJTouchId = t.identifier;
                const r = joystickZone.getBoundingClientRect(); jCenter = { x: r.left + r.width/2, y: r.top + r.height/2 };
                updateJoystick(t.clientX, t.clientY);
            });
            joystickZone.addEventListener('touchmove', e => {
                for(let i=0; i<e.changedTouches.length; i++) if(e.changedTouches[i].identifier === activeJTouchId) updateJoystick(e.changedTouches[i].clientX, e.changedTouches[i].clientY);
            });
            joystickZone.addEventListener('touchend', e => {
                for(let i=0; i<e.changedTouches.length; i++) if(e.changedTouches[i].identifier === activeJTouchId) { inputX=0; inputY=0; joystickKnob.style.transform=`translate(0px, 0px)`; activeJTouchId=null; }
            });

            function updateJoystick(clientX, clientY) {
                let dx = clientX - jCenter.x, dy = clientY - jCenter.y; const dist = Math.hypot(dx, dy);
                if (dist > 30) { dx = (dx/dist)*30; dy = (dy/dist)*30; }
                joystickKnob.style.transform = `translate(${dx}px, ${dy}px)`; inputX = dx / 30; inputY = dy / 30;
            }

            // Mobile jump and zoom buttons
            const jumpBtn = document.getElementById('jump-btn');
            jumpBtn.addEventListener('touchstart', e => { if (isGrounded) { velocityY = jumpStrength; isGrounded = false; } });
            document.getElementById('zoom-in-btn').addEventListener('touchstart', e => { targetZoom = Math.max(0, targetZoom - 1.5); });
            document.getElementById('zoom-out-btn').addEventListener('touchstart', e => { targetZoom = Math.min(maxZoom, targetZoom + 1.5); });

            // Look screen drag
            let lastTx = 0, lastTy = 0;
            document.getElementById('game-container').addEventListener('touchstart', e => {
                if(e.target.closest('.virtual-joystick-area')) return;
                lastTx = e.touches[0].clientX; lastTy = e.touches[0].clientY;
            });
            document.getElementById('game-container').addEventListener('touchmove', e => {
                if(e.target.closest('.virtual-joystick-area')) return;
                yaw -= (e.touches[0].clientX - lastTx) * 0.005; pitch -= (e.touches[0].clientY - lastTy) * 0.005;
                pitch = Math.max(-Math.PI/2 + 0.1, Math.min(Math.PI/2 - 0.1, pitch));
                lastTx = e.touches[0].clientX; lastTy = e.touches[0].clientY;
            });

            gameNetworkIntervalHandle = setInterval(() => {
                if (client && client.connected) {
                    client.publish(`robox3d_v4/rooms/${currentActiveRoomId}/positions/${runtimeClientId}`, JSON.stringify({
                        name: localPlayerName, x: characterGroupNode.position.x, y: characterGroupNode.position.y, z: characterGroupNode.position.z,
                        qx: characterGroupNode.quaternion.x, qy: characterGroupNode.quaternion.y, qz: characterGroupNode.quaternion.z, qw: characterGroupNode.quaternion.w
                    }), { qos: 0 });
                }
            }, 50);

            function animate() {
                gameAnimationFrameHandle = requestAnimationFrame(animate);

                let moveForward = (keys.w ? 1 : 0) - (keys.s ? 1 : 0) - inputY;
                let moveRight = (keys.d ? 1 : 0) - (keys.a ? 1 : 0) + inputX;
                
                if (Math.hypot(moveRight, moveForward) > 0.05) {
                    const forwardDirX = -Math.sin(yaw), forwardDirZ = -Math.cos(yaw);
                    const rightDirX = Math.cos(yaw), rightDirZ = -Math.sin(yaw);

                    characterGroupNode.position.x += (forwardDirX * moveForward + rightDirX * moveRight) * 0.15;
                    characterGroupNode.position.z += (forwardDirZ * moveForward + rightDirZ * moveRight) * 0.15;
                    characterGroupNode.rotation.y = yaw;
                }

                // Physics logic (Gravity)
                if (!isGrounded) {
                    velocityY += -0.015; characterGroupNode.position.y += velocityY;
                    if (characterGroupNode.position.y <= 0.5) { characterGroupNode.position.y = 0.5; velocityY = 0; isGrounded = true; }
                }

                // Zoom logic and camera switch
                actualZoom += (targetZoom - actualZoom) * 0.1;
                const lookDirX = -Math.sin(yaw) * Math.cos(pitch); const lookDirY = Math.sin(pitch); const lookDirZ = -Math.cos(yaw) * Math.cos(pitch);

                if (actualZoom < 0.5) {
                    characterGroupNode.visible = false; document.getElementById('crosshair').style.display = 'block';
                    camera.position.set(characterGroupNode.position.x, characterGroupNode.position.y + 0.3, characterGroupNode.position.z);
                    camera.lookAt(characterGroupNode.position.x + lookDirX, characterGroupNode.position.y + lookDirY, characterGroupNode.position.z + lookDirZ);
                } else {
                    characterGroupNode.visible = true; document.getElementById('crosshair').style.display = 'none';
                    camera.position.set(characterGroupNode.position.x - lookDirX * actualZoom, characterGroupNode.position.y + 1 - lookDirY * actualZoom, characterGroupNode.position.z - lookDirZ * actualZoom);
                    camera.lookAt(characterGroupNode.position.x, characterGroupNode.position.y + 1, characterGroupNode.position.z);
                }

                remotePlayers.forEach((pData, id) => {
                    if (Date.now() - pData.lastUpdate > 4000) { scene.remove(pData.mesh); remotePlayers.delete(id); } 
                    else { pData.mesh.position.lerp(pData.targetPos, 0.2); pData.mesh.quaternion.slerp(pData.targetQuat, 0.2); }
                });

                renderer.render(scene, camera);
            }
            
            const onResizeRef = () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); };
            window.addEventListener('resize', onResizeRef);
            
            window._teardownCurrentWorldInstance = () => {
                cancelAnimationFrame(gameAnimationFrameHandle); clearInterval(gameNetworkIntervalHandle);
                client.unsubscribe(`robox3d_v4/rooms/${currentActiveRoomId}/positions/#`, { qos: 0 });
                client.unsubscribe(`robox3d_v4/rooms/${currentActiveRoomId}/chat`, { qos: 0 });
                
                document.removeEventListener('keydown', onKeyD); document.removeEventListener('keyup', onKeyU);
                document.removeEventListener('mousedown', onMouseD); document.removeEventListener('mouseup', onMouseU);
                document.removeEventListener('mousemove', onMouseM); document.removeEventListener('wheel', onWheel);
                window.removeEventListener('resize', onResizeRef);

                renderer.dispose(); renderer.domElement.remove(); activeEngineSceneReference = null;
            };
            animate();
        }

        function exitWorldEngine() {
            if (window._teardownCurrentWorldInstance) window._teardownCurrentWorldInstance();
            document.exitPointerLock?.();
            document.getElementById('game-container').style.display = 'none';
            document.getElementById('homepage-launcher').style.display = 'flex';
        }
    </script>
</body>
</html>
